workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    environment:
      groups:
        - android_signing
      node: latest
      java: 21
      vars:
        PACKAGE_NAME: "com.cooneystrucking.trucktracker"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor Android project
        script: npx cap sync android
      - name: Decode signing keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/keystore.jks
      - name: Build signed release APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - mattkelly2424@gmail.com

  ios-adhoc:
    name: iOS Ad Hoc Build
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.cooneystrucking.trucktracker"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates --certificate @env:CM_CERTIFICATE --certificate-password @env:CM_CERTIFICATE_PASSWORD
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_ADHOC --create
          xcode-project use-profiles
      - name: Build ipa for ad hoc distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - mattkelly2424@gmail.com
