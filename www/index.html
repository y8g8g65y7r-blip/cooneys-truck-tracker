<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cooney's Trucking — Truck Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#15161a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CT Tracker">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #15161a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .logo { text-align: center; margin-bottom: 36px; }

    .logo-top {
      font-size: 36px;
      font-weight: 900;
      color: var(--brand-blue);
      letter-spacing: 1px;
      line-height: 1;
    }

    .logo-sub {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 7px;
      padding: 5px 18px 5px 12px;
      margin-top: 8px;
      clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    }

    .logo-tagline {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      margin-top: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .logo-since {
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      font-weight: 700;
      margin-top: 5px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .card h2 {
      font-size: 17px;
      color: #15161a;
      font-weight: 700;
      margin-bottom: 22px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 15px 16px;
      font-size: 16px;
      color: #15161a;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--brand-blue); }

    .btn-primary {
      width: 100%;
      background: #15161a;
      color: var(--brand-blue);
      border: none;
      border-radius: 10px;
      padding: 17px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.2s;
    }

    .btn-primary:hover { background: #24262e; }
    .btn-primary:active { background: var(--brand-blue); color: #ffffff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-top">COONEY'S</div>
    <div class="logo-sub">TRUCKING</div>
    <div class="logo-tagline">Moving Earth, Driving Progress</div>
    <div class="logo-since">Since 1996</div>
  </div>

  <div class="card">
    <h2>Sign In</h2>
    <div class="error" id="error"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="name@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="login()">Sign In</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) redirectByRole(session.user.id)
    })

    async function login() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('loginBtn')
      const err = document.getElementById('error')

      err.style.display = 'none'
      btn.textContent = 'Signing in...'
      btn.disabled = true

      const { data, error } = await sb.auth.signInWithPassword({ email, password })

      if (error) {
        err.textContent = 'Invalid email or password. Please try again.'
        err.style.display = 'block'
        btn.textContent = 'Sign In'
        btn.disabled = false
        return
      }

      redirectByRole(data.user.id)
    }

    async function redirectByRole(userId) {
      const { data } = await sb.from('profiles').select('role').eq('id', userId).single()
      window.location.href = data?.role === 'admin' ? 'dispatcher.html' : 'dashboard.html'
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login() })

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        if (regs.length > 0) {
          Promise.all(regs.map(r => r.unregister())).then(() => window.location.reload())
        }
      })
    }
  </script>
</body>
</html>
