<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#004AAD"/>
  <!-- Clean side-view delivery truck, white knockout, readable at small sizes -->
  <g fill="#FFFFFF">
    <!-- box / trailer -->
    <rect x="20" y="46" width="46" height="34" rx="3"/>
    <!-- cab -->
    <path d="M66 54 h20 a4 4 0 0 1 3.4 1.9 L98 70 a4 4 0 0 1 0.6 2.1 V80 H66 Z"/>
    <!-- windshield cutout -->
    <path d="M70 58 h13 l6 9 h-19 Z" fill="#004AAD"/>
  </g>
  <!-- wheels -->
  <g fill="#FFFFFF">
    <circle cx="38" cy="84" r="9"/>
    <circle cx="82" cy="84" r="9"/>
  </g>
  <g fill="#004AAD">
    <circle cx="38" cy="84" r="3.6"/>
    <circle cx="82" cy="84" r="3.6"/>
  </g>
</svg>
